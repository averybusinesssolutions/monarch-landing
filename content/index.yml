section:
  title: 'Better [data]{.text-primary}. Better [workflows]{.text-primary}. Better [care]{.text-primary}.'
  description: 'Transform your organization with data-driven insights and intelligent workflow optimization.'
  images:
    mobile: '/images/dark/dark-logo.svg'
    desktop: '/images/dark/dark-logo.svg'
  features:
    - title: Optimize decisions with trusted data
      description: Use analytics to surface what matters most. We turn fragmented operational data into clear, actionable insights—so teams spend less time guessing and more time improving outcomes.
      class: border-l border-primary pl-4
    - title: Understand performance patterns
      description: Identify when systems, teams, and processes perform at their best. Our analytics highlight trends, bottlenecks, and opportunities so complex work happens when impact is highest.
      class: border-l border-default pt-4 pl-4
    - title: Improve workflow efficiency
      description: Automate insight delivery across your workflows—from reporting to process optimization. Reduce manual effort, eliminate rework, and move faster with confidence backed by data.
      class: border-l border-default pt-4 pl-4
features:
  title: Take control of your [data]{.text-primary}
  description: Gain visibility, confidence, and control by turning your data into actionable intelligence.
  features:
    - title: EHR Optimimization
      description: Identify inefficiencies, standardize workflows, and enhance EHR data integrity.
      icon: i-lucide-wand-sparkles
      ui:
        leading: bg-accented/50 p-2 rounded-md border border-muted border-dashed
    - title: ETL/ELT Data Pipelines
      description: Integrate clinical and operational data into a unified, analytics-ready platform.
      icon: i-lucide-database-zap
      ui:
        leading: bg-accented/50 p-2 rounded-md border border-muted border-dashed
    - title: Custom Dashboards
      description: Transform raw data into intuitive dashboards that support confident decision-making.
      icon: i-lucide-chart-no-axes-combined
      ui:
        leading: bg-accented/50 p-2 rounded-md border border-muted border-dashed
    - title: Impact Engine
      description: A repeatable innovation engine that delivers measurable impact across people, process, and technology.
      icon: i-lucide-rocket
      ui:
        leading: bg-accented/50 p-2 rounded-md border border-muted border-dashed
    - title: Strategic Insights
      description: Deliver data-driven insights that guide strategy, prioritization, and investment decisions.
      icon: i-lucide-mouse-pointer-2
      ui:
        leading: bg-accented/50 p-2 rounded-md border border-muted border-dashed
    - title: Predictive Analytics
      description: Predict demand, outcomes, and resource needs before issues arise.
      icon: i-lucide-chart-line
      ui:
        leading: bg-accented/50 p-2 rounded-md border border-muted border-dashed
pricing:
